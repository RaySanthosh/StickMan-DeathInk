name: death_note
description: "Death Note - a stickman platformer where every death gets written in the Note."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.32.0
  flame_audio: ^2.11.10
  shared_preferences: ^2.5.3
  firebase_core: ^4.4.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.1.2
  cupertino_icons: ^1.0.8
  firebase_messaging: ^16.4.1
  google_sign_in: 6.2.2
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

# App launcher icon. Regenerate with:  dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/image/icon_1024.png"
  min_sdk_android: 23
  adaptive_icon_background: "#FBF7EC"
  adaptive_icon_foreground: "assets/image/icon_foreground.png"
  remove_alpha_ios: true

# Launch splash. Regenerate with:  dart run flutter_native_splash:create
flutter_native_splash:
  color: "#FBF7EC"
  image: "assets/image/icon_foreground.png"
  android_12:
    color: "#FBF7EC"
    image: "assets/image/icon_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/image/

  fonts:
    - family: PatrickHand
      fonts:
        - asset: assets/fonts/PatrickHand-Regular.ttf
    - family: Caveat
      fonts:
        - asset: assets/fonts/Caveat.ttf
