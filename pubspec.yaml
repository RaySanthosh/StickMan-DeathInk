name: death_note
description: "Death Note - a stickman platformer where every death gets written in the Note."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.32.0
  flame_audio: ^2.11.10
  shared_preferences: ^2.5.3
  firebase_core: ^4.4.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.1.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/

  fonts:
    - family: PatrickHand
      fonts:
        - asset: assets/fonts/PatrickHand-Regular.ttf
    - family: Caveat
      fonts:
        - asset: assets/fonts/Caveat.ttf
